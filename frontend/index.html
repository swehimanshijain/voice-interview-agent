<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Voice Interview Agent</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f4f6f9;
    padding:30px;
}

.container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 2px 12px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#070f39;
}

#progress{
    text-align:center;
    font-weight:bold;
    margin-bottom:15px;
}

#question{
    margin-top:15px;
    padding:20px;
    background:#eef3ff;
    border-radius:10px;
    font-size:22px;
    font-weight:bold;
    line-height:1.5;
}

#status{
    margin-top:15px;
    font-weight:bold;
    color:#070f39;
}

#transcript{
    margin-top:15px;
    font-style:italic;
    color:#555;
}

textarea{
    width:100%;
    margin-top:20px;
    padding:12px;
    font-size:16px;
    border-radius:8px;
    border:1px solid #ccc;
}

.buttons{
    margin-top:20px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
    background:#070f39;
    color:white;
}

button:hover{
    opacity:0.9;
}

#result{
    margin-top:20px;
    padding:15px;
    background:#f8f8f8;
    border-radius:10px;
}

.hidden{
    display:none;
}

</style>
</head>

<body>

<div class="container">

<h1>AI Voice Interview Agent</h1>

<div id="progress">
Question 0 / 12
</div>

<div class="buttons">

<button onclick="startInterview()">
Start Interview
</button>

<button onclick="startRecording()">
Start Recording
</button>

<button onclick="stopRecording()">
Stop Recording
</button>

</div>

<div id="status">
Ready
</div>

<div id="question">
Click Start Interview
</div>

<div id="transcript">
</div>

<textarea
id="answer"
rows="5"
placeholder="Transcript will appear here automatically">
</textarea>

<div id="result">
Waiting for interview...
</div>

</div>

<script>

const API_BASE_URL = "http://127.0.0.1:8000";

let mediaRecorder;
let audioChunks = [];

async function startInterview(){

    document.getElementById("status").innerHTML =
        "Starting Interview...";

    const response =
        await fetch(`${API_BASE_URL}/start`);

    const data =
        await response.json();

    document.getElementById("progress").innerHTML =
        `Question ${data.question_number} / ${data.total_questions}`;

    document.getElementById("question").innerHTML =
        data.question;

    document.getElementById("result").innerHTML =
        "Interview Started";

    speakText(data.question);
}

async function submitAnswer(){

    const answer =
        document.getElementById("answer").value;

    if(!answer.trim()){
        return;
    }

    document.getElementById("status").innerHTML =
        "Evaluating Answer...";

    const response =
        await fetch(
            `${API_BASE_URL}/answer?candidate_answer=${encodeURIComponent(answer)}`,
            {
                method:"POST"
            }
        );

    const data =
        await response.json();

    if(data.status === "follow_up"){

        document.getElementById("question").innerHTML =
            data.question;

        document.getElementById("result").innerHTML =
            "Follow-up Question";

        document.getElementById("status").innerHTML =
            "Please answer the follow-up question";

        speakText(data.question);
    }

    else if(data.status === "next_question"){

        document.getElementById("progress").innerHTML =
            `Question ${data.question_number} / ${data.total_questions}`;

        document.getElementById("question").innerHTML =
            data.question;

        document.getElementById("result").innerHTML =
            "";

        document.getElementById("status").innerHTML =
            "Next Question";

        speakText(data.question);
    }

    else if(data.status === "completed"){

        document.getElementById("progress").innerHTML =
            "Interview Completed";

        document.getElementById("question").innerHTML =
            "Interview Completed Successfully";

        document.getElementById("status").innerHTML =
            "Generating Final Feedback";

        document.getElementById("result").innerHTML =
        `
        <h2>Final Report</h2>

        <p><b>Overall Score:</b>
        ${data.feedback.overall_score}</p>

        <p><b>Strengths:</b>
        ${data.feedback.strengths.join(", ")}</p>

        <p><b>Areas To Improve:</b>
        ${data.feedback.improvements.join(", ")}</p>

        <p>${data.feedback.summary}</p>
        `;
    }

    document.getElementById("answer").value = "";
}

async function startRecording(){

    const stream =
        await navigator.mediaDevices.getUserMedia({
            audio:true
        });

    audioChunks = [];

    mediaRecorder =
        new MediaRecorder(stream);

    mediaRecorder.ondataavailable = e => {
        audioChunks.push(e.data);
    };

    mediaRecorder.start();

    document.getElementById("status").innerHTML =
        "Recording...";
}

async function stopRecording(){

    mediaRecorder.stop();

    mediaRecorder.onstop = async () => {

        document.getElementById("status").innerHTML =
            "Converting Speech To Text...";

        const audioBlob =
            new Blob(audioChunks,{
                type:"audio/webm"
            });

        const formData =
            new FormData();

        formData.append(
            "file",
            audioBlob,
            "recording.webm"
        );

        const response =
            await fetch(
                `${API_BASE_URL}/transcribe`,
                {
                    method:"POST",
                    body:formData
                }
            );

        const data =
            await response.json();

        document.getElementById("answer").value =
            data.transcript;

        document.getElementById("transcript").innerHTML =
            "Transcript: " + data.transcript;

        document.getElementById("status").innerHTML =
            "Submitting Answer...";

        await submitAnswer();
    };
}

async function speakText(text){

    try{

        const response =
            await fetch(
                `${API_BASE_URL}/speak?text=${encodeURIComponent(text)}`,
                {
                    method:"POST"
                }
            );

        const audioBlob =
            await response.blob();

        const audioUrl =
            URL.createObjectURL(audioBlob);

        const audio =
            new Audio(audioUrl);

        audio.play();
    }
    catch(error){

        console.log(error);
    }
}

</script>

</body>
</html>
